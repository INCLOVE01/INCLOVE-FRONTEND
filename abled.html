<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inclove – Tell Us About You</title>
    <link rel="stylesheet" href="abled.css">

</head>

<body>
    <!-- Hearts Background -->
    <div class="hearts-container"></div>

    <div class="container">
        <h1 class="page-title">We're Glad You're Here! ✨</h1>
        <p class="intro-text">Let's get to know you step-by-step to find your perfect match. Every detail helps us
            connect you with someone special.</p>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 14.3%"></div>
            </div>
            <div class="progress-text" id="progressText">Step 1 of 7</div>
        </div>

        <form id="interestedForm">
            <!-- Question 1 -->
            <div class="question-section active" id="q1">
                <div class="question-counter">1 / 7</div>
                <label for="name">✨ What's your beautiful name?</label>
                <input type="text" id="name" name="name" required class="form-input" placeholder="Enter your name...">
                <button type="button" class="btn-next" onclick="nextQuestion(1)">Continue</button>
            </div>

            <!-- Question 2 -->
            <div class="question-section" id="q2">
                <button type="button" class="btn-back" onclick="prevQuestion(2)">← Back</button>
                <div class="question-counter">2 / 7</div>
                <label for="age">🎂 How old are you?</label>
                <input type="number" id="age" name="age" required class="form-input" min="18" max="100"
                    placeholder="Enter your age...">
                <button type="button" class="btn-next" onclick="nextQuestion(2)">Continue</button>
            </div>

            <!-- Question 3 -->
            <div class="question-section" id="q3">
                <button type="button" class="btn-back" onclick="prevQuestion(3)">← Back</button>
                <div class="question-counter">3 / 7</div>
                <label for="gender">👤 How do you identify?</label>
                <select id="gender" name="gender" class="form-input" required>
                    <option value="">-- Choose your identity --</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="nonbinary">Non-binary</option>
                    <option value="other">Other</option>
                    <option value="prefer_not">Prefer not to say</option>
                </select>
                <button type="button" class="btn-next" onclick="nextQuestion(3)">Continue</button>
            </div>

            <!-- Question 4 -->
            <div class="question-section" id="q4">
                <button type="button" class="btn-back" onclick="prevQuestion(4)">← Back</button>
                <div class="question-counter">4 / 7</div>
                <label for="interested_gender">💕 Who are you interested in?</label>
                <select id="interested_gender" name="interested_gender" class="form-input" required>
                    <option value="">-- Select preference --</option>
                    <option value="male">Men</option>
                    <option value="female">Women</option>
                    <option value="nonbinary">Non-binary individuals</option>
                    <option value="all">Everyone</option>
                    <option value="prefer_not">Prefer not to say</option>
                </select>
                <button type="button" class="btn-next" onclick="nextQuestion(4)">Continue</button>
            </div>

            <!-- Question 5-->
            <div class="question-section" id="q5">
                <button type="button" class="btn-back" onclick="prevQuestion(5)">← Back</button>
                <div class="question-counter">5 / 7</div>
                <label for="disability_preference">🤝 Which community would you like to connect with?</label>
                <select id="disability_preference" name="disability_preference" class="form-input" required>
                    <option value="">-- Select community --</option>
                    <option value="visually_impaired">Visually Impaired Community</option>
                    <option value="hearing_impaired">Deaf/Hard of Hearing Community</option>
                    <option value="mobility_impaired">Mobility Impaired Community</option>
                    <option value="cognitive_disability">Cognitive Disability Community</option>
                    <option value="chronic_illness">Chronic Illness Community</option>
                    <option value="mental_health">Mental Health Community</option>
                    <option value="all_communities">All Communities</option>
                    <option value="other">Other</option>
                </select>
                <button type="button" class="btn-next" onclick="nextQuestion(5)">Continue</button>
            </div>

            <!-- Question 6 -->
            <div class="question-section" id="q6">
                <button type="button" class="btn-back" onclick="prevQuestion(6)">← Back</button>
                <div class="question-counter">6 / 7</div>
                <label for="email">📧 What's your email address?</label>
                <input type="email" id="email" name="email" class="form-input" required
                    placeholder="your.email@example.com">
                <button type="button" class="btn-next" onclick="nextQuestion(6)">Send Verification Code</button>
            </div>

            <!-- Question 7 -->
            <div class="question-section" id="q7">
                <button type="button" class="btn-back" onclick="prevQuestion(7)">← Back</button>
                <div class="question-counter">7 / 7</div>
                <label for="about">📝 Tell us your story</label>
                <textarea id="about" name="about" rows="5" class="form-input" required
                    placeholder="Share what makes you unique... your hobbies, passions, dreams, what you're looking for in a connection..."></textarea>
                <a href="explore.html" style="text-decoration: none;">
                    <button type="button" class="btn-next">Complete Profile & Continue 🎉</button>
                </a>
            </div>
        </form>
    </div>

    <script src="abled.js"></script>
</body>

</html>
